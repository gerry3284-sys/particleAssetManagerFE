<div class="dropdown" [class.error]="error()" [class.disabled]="isDisabled()">
  <button
    type="button"
    class="dropdown-trigger"
    (click)="toggleDropdown()"
    (blur)="closeDropdown()"
    [attr.aria-expanded]="dropdownOpen()"
    [disabled]="isDisabled()"
  >
    <span class="dropdown-label" [class.placeholder]="!selectedOption()">
      {{ displayLabel() }}
    </span>
    <span class="dropdown-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  @if (dropdownOpen()) {
    <div class="dropdown-panel">
      @for (option of options(); track option.value) {
        <button type="button" (mousedown)="selectOption(option)">
          <span>{{ option.label }}</span>
          @if (option.subLabel) {
            <small>{{ option.subLabel }}</small>
          }
        </button>
      }
      @if (options().length === 0) {
        <div class="dropdown-empty">{{ emptyLabel() }}</div>
      }
    </div>
  }
</div>
