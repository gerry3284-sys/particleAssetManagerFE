@if (isOpen()) {
  <div class="modal-overlay" (click)="onOverlayClick()">
    <div class="modal-card" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-icon">i</div>
        <div>
          <h3>Assegna asset</h3>
        </div>
      </div>

      <div class="modal-body">
        <!--
        <div class="field">
          <label>Data di assegnazione</label>
          <div class="input-with-icon" [class.error]="dateError()">
            <input
              #dateInput
              type="date"
              [value]="assignmentDate()"
              (input)="onDateChange(dateInput.value)"
              required
            />
             <span class="input-icon" aria-hidden="true">
               <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8" />
                <path d="M16 3v4M8 3v4M3 9h18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </span>  
          </div>
          @if (dateError()) {
            <p class="error-text">Seleziona una data valida.</p>
          }
        </div>
        -->

        <div class="field">
          <label>Seleziona l'utente a cui assegnare l'asset</label>
          <app-dropdown-search
            [options]="userOptions()"
            [error]="userError()"
            placeholder="Inizia a scrivere..."
            [ngModel]="selectedUserId()"
            (ngModelChange)="selectedUserId.set($event); userError.set(false)"
            required
          ></app-dropdown-search>
          <p class="helper-text">
            TUTTI gli utenti indipendentemente da BU. mostrare alert se bu diversa
          </p>
          @if (userError()) {
            <p class="error-text">Seleziona un utente dalla lista.</p>
          }
        </div>

        <div class="field">
          <label>Note (Opzionale)</label>
          <textarea
            #notesInput
            rows="3"
            placeholder="Es. rimossa SSD, ecc..."
            [value]="notes()"
            (input)="notes.set(notesInput.value)"
          ></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <app-button variant="secondary" type="button" (pressed)="close.emit()">Annulla</app-button>
        <app-button variant="primary" type="button" (pressed)="submit()">Assegna</app-button>
      </div>
    </div>
  </div>
}
